name: QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  route-a11y:
    name: Build and route accessibility QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm

      - name: Print tool versions
        run: |
          node --version
          npm --version
          npm config get registry

      - name: Validate lockfile
        run: npm ci --dry-run

      - name: Install dependencies
        id: install-dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Route accessibility QA
        run: npm run qa:a11y:routes:ci

      - name: Write route accessibility summary
        if: always() && steps.install-dependencies.outcome == 'success'
        run: npm run qa:a11y:routes:json:file

      - name: Upload route accessibility summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-a11y-summary
          path: .qa/route-a11y-summary.json
          if-no-files-found: ignore
